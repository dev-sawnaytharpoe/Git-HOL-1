<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Shop Purchase Inquiry</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>☕ Coffee Shop Purchase Inquiry</h1>
      <p>Tell us about your interest in acquiring our coffee shop</p>
    </div>

    <div class="form-container">
      <div class="info-text">
        <strong>Ready to brew your business dreams?</strong> Fill out this form and we'll get back to you within 24
        hours to discuss this exciting opportunity.
      </div>

      <form action="#" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name <span class="required">*</span></label>
            <input type="text" id="firstName" name="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name <span class="required">*</span></label>
            <input type="text" id="lastName" name="lastName" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number <span class="required">*</span></label>
            <input type="tel" id="phone" name="phone" required>
          </div>
        </div>

        <div class="form-group">
          <label for="experience">Business Experience</label>
          <select id="experience" name="experience">
            <option value="">Select your experience level</option>
            <option value="first-time">First-time business owner</option>
            <option value="some-experience">Some business experience</option>
            <option value="restaurant-experience">Restaurant/cafe experience</option>
            <option value="extensive-experience">Extensive business experience</option>
          </select>
        </div>

        <div class="form-group">
          <label for="budget">Budget Range <span class="required">*</span></label>
          <select id="budget" name="budget" required>
            <option value="">Select your budget range</option>
            <option value="under-100k">Under $100,000</option>
            <option value="100k-250k">$100,000 - $250,000</option>
            <option value="250k-500k">$250,000 - $500,000</option>
            <option value="500k-1m">$500,000 - $1,000,000</option>
            <option value="over-1m">Over $1,000,000</option>
          </select>
        </div>

        <div class="form-group">
          <label for="timeline">Preferred Timeline</label>
          <select id="timeline" name="timeline">
            <option value="">When would you like to complete the purchase?</option>
            <option value="asap">As soon as possible</option>
            <option value="1-3-months">1-3 months</option>
            <option value="3-6-months">3-6 months</option>
            <option value="6-12-months">6-12 months</option>
            <option value="over-1-year">Over 1 year</option>
          </select>
        </div>

        <div class="form-group">
          <label for="financing">Financing Needs</label>
          <select id="financing" name="financing">
            <option value="">Do you need financing assistance?</option>
            <option value="cash-purchase">Cash purchase</option>
            <option value="partial-financing">Partial financing needed</option>
            <option value="full-financing">Full financing needed</option>
            <option value="exploring-options">Exploring options</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Additional Comments or Questions</label>
          <textarea id="message" name="message"
            placeholder="Tell us more about your interest, any specific questions about the business, or additional information you'd like to share..."></textarea>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="consent" name="consent" required>
          <label for="consent">I consent to being contacted about this coffee shop purchase opportunity and understand
            that my information will be kept confidential. <span class="required">*</span></label>
        </div>

        <button type="submit" class="submit-btn">Submit Inquiry</button>
      </form>
    </div>
  </div>
</body>

</html>
